syntax = "proto3";

option csharp_namespace = "Backend.Contracts.Grpc";

package players;

service PlayersService {
  rpc GetOrCreatePlayer (GetOrCreatePlayerRequest) returns (GetOrCreatePlayerReply);
}

message GetOrCreatePlayerRequest {
  string nickname = 1;
}

message GetOrCreatePlayerReply {
  string id = 1;
  string nickname = 2;
}
