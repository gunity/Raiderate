syntax = "proto3";

option csharp_namespace = "Backend.Contracts.Grpc";

package identity;

service IdentityService {
  rpc GetLoginsByUserId (GetLoginsByUserIdRequest) returns (GetLoginsByUserIdReply);
}

message GetLoginsByUserIdRequest {
  repeated string ids = 1;
}

message UserLoginItem {
  string id = 1;
  string login = 2;
}

message GetLoginsByUserIdReply {
  repeated  UserLoginItem items = 1;
}
